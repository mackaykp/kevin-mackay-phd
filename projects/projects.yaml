# image: optional path (relative to site root) or leave blank for placeholder.
# Tags must match strings in tag_categories in projects/index.qmd (same spelling/casing).
# Extended conventions and rationale: private-docs/projects-tags-and-categories.md (local; gitignored).
#
# pinned_hrefs: optional list of 0-3 href strings that exactly match project href values (order = display order).
# Omit or use [] for no featured pins. Unknown hrefs are ignored. Only the first 3 list entries are used.

